<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#eef1f6" />
<title>Beach Dog · Cromer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%90%B6%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-text">
          <div class="brand-name">Beach Dog</div>
          <div class="brand-sub">Cromer</div>
        </div>
      </div>
      <div class="topbar-meta" id="updated">—</div>
    </header>

    <section class="verdict-hero" id="verdict" data-level="ok" aria-live="polite">
      <div class="score">
        <span class="score-num" id="verdictScore">—</span>
        <span class="score-den">/ 100</span>
      </div>
      <div class="verdict-copy">
        <div class="verdict-headline" id="verdictHeadline">Sniffing the breeze…</div>
        <div class="verdict-sub" id="verdictSub">Loading conditions for Cromer beach</div>
      </div>
    </section>

    <section class="factors" id="factors">
      <article class="card" data-factor="weather">
        <div class="card-label">Weather</div>
        <div class="card-value" id="weatherValue">—</div>
        <div class="card-meta" id="weatherMeta">—</div>
      </article>
      <article class="card" data-factor="temp">
        <div class="card-label">Temperature</div>
        <div class="card-value" id="tempValue">—</div>
        <div class="card-meta" id="tempMeta">feels like —</div>
      </article>
      <article class="card" data-factor="wind">
        <div class="card-label">Wind</div>
        <div class="card-value" id="windValue">—</div>
        <div class="card-meta" id="windMeta">—</div>
      </article>
      <article class="card" data-factor="tide">
        <div class="card-label">Tide</div>
        <div class="card-value" id="tideValue">—</div>
        <div class="card-meta" id="tideMeta">—</div>
      </article>
      <article class="card" data-factor="busy">
        <div class="card-label">Busyness</div>
        <div class="card-value" id="busyValue">—</div>
        <div class="card-meta" id="busyMeta">—</div>
      </article>
    </section>

    <section class="tide-panel" aria-labelledby="tidePanelTitle">
      <div class="tide-panel-head">
        <div class="tide-panel-title" id="tidePanelTitle">Tide · next 18 hours</div>
        <div class="tide-panel-sub" id="tidePanelSub">—</div>
      </div>
      <div class="tide-chart" id="tideChart" aria-hidden="true"></div>
    </section>

    <footer class="foot">
      <div class="credits">Data from <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a></div>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
